services:
  postgres:
    image: postgres:18.3
    container_name: verso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-verso}
      POSTGRES_USER: ${POSTGRES_USER:-verso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verso_secure_password}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-md5}
      PGDATA: /var/lib/postgresql/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verso}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - verso-network

volumes:
  postgres_data:
    driver: local

networks:
  verso-network:
    driver: bridge
