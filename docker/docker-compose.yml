services:
  web:
    image: ghcr.io/parazeeknova/verso-web:latest
    depends_on:
      backy:
        condition: service_healthy
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      BACKY_HOST: backy
      BACKY_PORT: "7000"
    ports:
      - "8080:8080"
    restart: unless-stopped

  backy:
    image: ghcr.io/parazeeknova/verso-serve:latest
    environment:
      PORT: "7000"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      WEB_ORIGIN: ${WEB_ORIGIN}
    expose:
      - "7000"
    restart: unless-stopped
    healthcheck:
      test: [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7000/health
          || exit 1",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
