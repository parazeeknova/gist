services:
  web:
    image: ghcr.io/parazeeknova/verso-web:latest
    container_name: verso-web
    pull_policy: always
    depends_on:
      backy:
        condition: service_healthy
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      BACKY_HOST: backy
      BACKY_PORT: "8080"
    ports:
      - "8081:8080"
    networks:
      - edge
      - private
    restart: unless-stopped

  backy:
    image: ghcr.io/parazeeknova/verso-serve:latest
    container_name: verso-backy
    pull_policy: always
    environment:
      PORT: "8080"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      WEB_ORIGIN: ${WEB_ORIGIN}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES}
    expose:
      - "8080"
    networks:
      - private
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  edge:
    driver: bridge
  private:
    driver: bridge
    internal: true
