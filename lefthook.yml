pre-commit:
  commands:
    lint-format:
      run: bun run check
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
    go-format:
      run: cd packages/backy && ./scripts/format.sh
      glob:
        - "packages/backy/**/*.go"
      stage_fixed: true
    autobump:
      run: go run scripts/autobump.go
      glob:
        - "scripts/autobump.go"
        - "packages/**/package.json"
        - "packages/**/*.go"
        - "lerna.json"
      stage_fixed: true

pre-push:
  commands:
    monorepo-check:
      run: bun run check:ci
    monorepo-check-types:
      run: bun run check-types
