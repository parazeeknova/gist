pre-commit:
  jobs:
    - run: bun ultracite fix
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
    - run: cd packages/backy && ./scripts/format.sh
      glob:
        - "packages/backy/**/*.go"
      stage_fixed: true
    - run: go run scripts/autobump.go
      name: autobump
      stage_fixed: true

pre-push:
  jobs:
    - run: bun run check
      name: monorepo-check
    - run: bun run check-types
      name: monorepo-check-types
