pre-commit:
  jobs:
    - run: bun run check
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
    - run: cd packages/backy && ./scripts/format.sh
      glob:
        - "packages/backy/**/*.go"
      stage_fixed: true
    - run: go run scripts/autobump.go
      name: autobump
      glob:
        - "packages/**/package.json"
        - "packages/**/*.ts"
        - "packages/**/*.tsx"
        - "packages/**/*.js"
        - "packages/**/*.jsx"
        - "packages/**/*.go"
        - "lerna.json"
      stage_fixed: true

pre-push:
  jobs:
    - run: bun run check:ci
      name: monorepo-check
    - run: bun run check-types
      name: monorepo-check-types
